<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products | Agro-Connect</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="container navbar-container">
            <a href="../index.html" class="navbar-brand"><i class="fas fa-leaf"></i> Agro-Connect</a>
            <ul class="navbar-menu">
                <li><a href="dashboard.html" class="navbar-link"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="products.html" class="navbar-link active"><i class="fas fa-box"></i> My Products</a></li>
                <li><a href="#" onclick="logout('farmer')" class="navbar-link"><i class="fas fa-sign-out-alt"></i>
                        Logout</a></li>
                <li><a href="#" id="theme-toggle" onclick="toggleTheme()" class="navbar-link"><i class="fas fa-moon"
                            id="theme-icon"></i></a></li>
            </ul>
        </div>
    </nav>

    <div class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h1 class="dashboard-title">My Products</h1>
                <button onclick="openAddProductModal()" class="btn btn-primary"><i class="fas fa-plus"></i> Add New
                    Product</button>
            </div>

            <div id="products-grid" class="products-grid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addProductModal')">&times;</span>
            <h2>Add New Product</h2>
            <form id="addProductForm" onsubmit="handleAddProduct(event)">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" name="product_name" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="Cereals">Cereals</option>
                        <option value="Vegetables">Vegetables</option>
                        <option value="Fruits">Fruits</option>
                        <option value="Spices">Spices</option>
                        <option value="Pulses">Pulses</option>
                        <option value="Coffee">Coffee</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" name="quantity" required min="1">
                        <select name="unit" style="width: 100px;">
                            <option value="kg">kg</option>
                            <option value="quintal">quintal</option>
                            <option value="pcs">pcs</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Price per unit (ETB)</label>
                    <input type="number" name="price" required min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Add Product</button>
            </form>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div id="editProductModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('editProductModal')">&times;</span>
            <h2>Edit Product</h2>
            <form id="editProductForm" onsubmit="handleEditProduct(event)">
                <input type="hidden" name="product_id">
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" required min="0">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="number" name="price" required min="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        <option value="available">Available</option>
                        <option value="sold_out">Sold Out</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%">Update Product</button>
            </form>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script>
        const farmer = checkAuth('farmer');

        if (farmer) {
            loadProducts();
        }

        async function loadProducts() {
            try {
                const res = await fetch(`/api/farmer/products?farmer_id=${farmer.farmer_id}`);
                const data = await res.json();

                if (data.success) {
                    renderProducts(data.data);
                }
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            if (products.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No products added yet.</p>';
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="card product-card fade-in">
                    <div class="card-header">
                        <h3>${p.product_name}</h3>
                        <span class="badge ${p.status === 'available' ? 'badge-success' : 'badge-danger'}">${p.status}</span>
                    </div>
                    <div class="card-body">
                        <p><strong>Category:</strong> ${p.category}</p>
                        <p><strong>Available:</strong> ${p.quantity} ${p.unit}</p>
                        <p><strong>Price:</strong> ${formatCurrency(p.price)} / ${p.unit}</p>
                        <p class="text-muted">${p.description || ''}</p>
                        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
                            <button onclick="openEditModal(${JSON.stringify(p).replace(/"/g, '&quot;')})" class="btn btn-secondary btn-sm">Edit</button>
                            <button onclick="deleteProduct(${p.product_id})" class="btn btn-danger btn-sm">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openAddProductModal() {
            document.getElementById('addProductModal').style.display = 'block';
        }

        function openEditModal(product) {
            const form = document.getElementById('editProductForm');
            form.product_id.value = product.product_id;
            form.quantity.value = product.quantity;
            form.price.value = product.price;
            form.status.value = product.status;
            document.getElementById('editProductModal').style.display = 'block';
        }

        async function handleAddProduct(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            formData.append('farmer_id', farmer.farmer_id);

            try {
                const res = await fetch('/api/products/add', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                const data = await res.json();

                if (data.success) {
                    closeModal('addProductModal');
                    form.reset();
                    loadProducts();
                    showAlert('Product added successfully!', 'success');
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                console.error('Error adding product:', error);
            }
        }

        async function handleEditProduct(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);

            try {
                const res = await fetch('/api/products/update', {
                    method: 'POST',
                    body: new URLSearchParams(formData)
                });
                const data = await res.json();

                if (data.success) {
                    closeModal('editProductModal');
                    loadProducts();
                    showAlert('Product updated successfully!', 'success');
                } else {
                    showAlert(data.message, 'error');
                }
            } catch (error) {
                console.error('Error updating product:', error);
            }
        }
    </script>
</body>

</html>
